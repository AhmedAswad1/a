<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة Ahmed Abdul Lateef</title>
    <style>
        :root {
            --bg-color: #000000;       /* خلفية الشاشة سوداء صافية */
            --calc-bg: #1a1a1a;        /* جسم الحاسبة رمادي داكن ليتميز عن الخلفية */
            --text-color: #ffffff;     /* لون الأرقام */
            --accent: #00a8ff;         /* لون أزرق للعمليات */
            --btn-bg: #262626;         /* لون الأزرار العادية */
            --display-bg: #0d0d0d;     /* لون شاشة الأرقام */
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .calculator {
            background-color: var(--calc-bg);
            padding: 25px;
            border-radius: 25px;
            width: 330px;
            /* إضافة إطار خفيف جداً حول الحاسبة لتكون واضحة وسط السواد */
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
        }

        .display {
            width: 100%;
            height: 75px;
            background: var(--display-bg);
            border: 1px solid #222;
            outline: none;
            text-align: right;
            font-size: 40px;
            color: var(--text-color);
            margin-bottom: 20px;
            padding: 15px;
            box-sizing: border-box;
            border-radius: 15px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 65px;
            border-radius: 15px;
            border: none;
            background-color: var(--btn-bg);
            color: var(--text-color);
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s ease-out;
            outline: none;
        }

        /* تأثير الفقاعة عند الضغط */
        button:active {
            transform: scale(1.15); 
            background-color: #444;
        }

        .operator { color: var(--accent); background-color: #202020; }
        .clear { color: #ff4757; }
        .equal {
            background-color: var(--accent);
            color: white;
            grid-column: span 2;
            width: 100%;
        }
        
        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
            color: #444;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" class="display" id="screen" readonly placeholder="0">
    <div class="buttons">
        <button class="clear" onclick="clearScreen()">C</button>
        <button class="operator" onclick="deleteLast()">DEL</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">÷</button>
        
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>
        
        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">-</button>
        
        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>
        
        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
<button onclick="copyResult()">Copy</button>
    </div>
    <div class="footer">Developed by: Ahmed Abdul Lateef</div>
</div>

<script>
    let screen = document.getElementById('screen');

    function append(val) {
        if (screen.value === "Error") screen.value = "";
        screen.value += val;
    }

    function clearScreen() {
        screen.value = "";
    }

    function deleteLast() {
        screen.value = screen.value.slice(0, -1);
    }

    function calculate() {
        try {
            let result = eval(screen.value.replace('x', '*').replace('÷', '/'));
            screen.value = Number.isInteger(result) ? result : result.toFixed(2);
        } catch (e) {
            screen.value = "Error";
        }
    }

    function copyResult() {
        navigator.clipboard.writeText(screen.value);
        alert("Copied!");
    }
</script>

</body>
</html>
