<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة Ahmed Abdul Lateef</title>
    <style>
        /* هنا يمكنك تغيير الألوان بسهولة */
        :root {
            --bg-color: #0f172a;       /* لون خلفية الشاشة (كحلي غامق جداً) */
            --calc-bg: #1e293b;        /* لون جسم الحاسبة */
            --text-color: #f8fafc;     /* لون الأرقام */
            --accent: #38bdf8;         /* لون العمليات (أزرق سماوي) */
            --equal-btn: #0ea5e9;      /* لون زر اليساوي */
            --clear-btn: #ef4444;      /* لون زر المسح */
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .calculator {
            background-color: var(--calc-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 320px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .display {
            width: 100%;
            height: 70px;
            background: rgba(0,0,0,0.2);
            border: none;
            outline: none;
            text-align: right;
            font-size: 36px;
            color: var(--text-color);
            margin-bottom: 20px;
            padding: 15px;
            box-sizing: border-box;
            border-radius: 12px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 65px;
            border-radius: 12px;
            border: none;
            background-color: #334155;
            color: var(--text-color);
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background-color: #475569; }
        button:active { transform: scale(0.9); }

        .operator { color: var(--accent); background-color: #1e293b; border: 1px solid #334155; }
        .clear { color: var(--clear-btn); }
        .equal {
            background-color: var(--equal-btn);
            color: white;
            grid-column: span 2;
        }
        
        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" class="display" id="screen" readonly placeholder="0">
    <div class="buttons">
        <button class="clear" onclick="clearScreen()">C</button>
        <button class="operator" onclick="deleteLast()">DEL</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">÷</button>
        
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>
        
        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">-</button>
        
        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>
        
        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
    <div class="footer">Developed by: Ahmed Abdul Lateef</div>
</div>

<script>
    let screen = document.getElementById('screen');
    function append(val) { if (screen.value === "Error") screen.value = ""; screen.
        value += val; }
    function clearScreen() { screen.value = ""; }
    function deleteLast() { screen.value = screen.value.slice(0, -1); }
    function calculate() {
        try {
            let result = eval(screen.value.replace('×', '*').replace('÷', '/'));
            screen.value = Number.isInteger(result) ? result : result.toFixed(2);
        } catch (e) { screen.value = "Error"; }
    }
</script>
</body>
</html>
